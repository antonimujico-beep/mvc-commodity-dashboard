<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antoni — Agent Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0b0f1a;
  color: #e2e8f0;
  min-height: 100vh;
}

/* ── Header ── */
header {
  background: #111827;
  border-bottom: 1px solid #1f2937;
  padding: 16px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, #048A81, #54C6EB);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.logo h1 { font-size: 16px; font-weight: 700; color: #fff; }
.logo p  { font-size: 11px; color: #6b7280; margin-top: 1px; }

.header-right { display: flex; gap: 10px; align-items: center; }
.live-pill {
  display: flex; align-items: center; gap: 5px;
  background: #052e16; border: 1px solid #16a34a44;
  color: #4ade80; padding: 4px 11px; border-radius: 20px;
  font-size: 11px; font-weight: 600;
}
.live-dot {
  width: 6px; height: 6px; background: #4ade80;
  border-radius: 50%; animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ── Stats ── */
.stats {
  display: flex; gap: 14px; padding: 16px 28px;
  background: #0e1320; border-bottom: 1px solid #1f2937;
}
.stat {
  background: #111827; border: 1px solid #1f2937;
  border-radius: 10px; padding: 12px 18px;
  display: flex; align-items: center; gap: 10px; flex: 1;
}
.stat-icon { font-size: 20px; }
.stat-label { font-size: 10px; color: #6b7280; text-transform: uppercase; letter-spacing: .4px; }
.stat-val   { font-size: 20px; font-weight: 700; color: #54C6EB; line-height: 1.2; }

/* ── Company Tabs ── */
.tabs {
  display: flex; gap: 0; padding: 0 28px;
  background: #0e1320; border-bottom: 1px solid #1f2937;
  overflow-x: auto;
}
.tab {
  padding: 13px 20px; font-size: 13px; font-weight: 600;
  color: #6b7280; cursor: pointer; border-bottom: 2px solid transparent;
  white-space: nowrap; transition: all .15s; display: flex;
  align-items: center; gap: 6px;
}
.tab:hover { color: #e2e8f0; }
.tab.active { color: #fff; border-bottom-color: var(--co-color, #048A81); }
.tab-badge {
  background: #1f2937; border-radius: 10px;
  padding: 1px 7px; font-size: 10px; color: #9ca3af;
}

/* ── NL Bar ── */
.nl-wrap {
  padding: 14px 28px; background: #0e1320;
  border-bottom: 1px solid #1f2937;
}
.nl-row {
  display: flex; gap: 8px; align-items: center;
  background: #111827; border: 1px solid #1f2937;
  border-radius: 10px; padding: 4px 4px 4px 14px;
  transition: border-color .2s;
}
.nl-row:focus-within { border-color: #048A81; box-shadow: 0 0 0 2px #048A8120; }
.nl-input {
  flex: 1; background: transparent; border: none; outline: none;
  color: #e2e8f0; font-size: 13px; padding: 9px 0;
}
.nl-input::placeholder { color: #4b5563; }

.nl-selects { display: flex; gap: 6px; align-items: center; }
.nl-select {
  background: #1f2937; border: 1px solid #374151; color: #d1d5db;
  border-radius: 7px; padding: 6px 10px; font-size: 12px; outline: none;
  cursor: pointer;
}
.nl-select:focus { border-color: #048A81; }

.btn-nl {
  background: linear-gradient(135deg, #048A81, #065f5c);
  color: #fff; border: none; border-radius: 8px;
  padding: 9px 16px; font-size: 12px; font-weight: 700;
  cursor: pointer; white-space: nowrap; transition: opacity .15s;
}
.btn-nl:hover { opacity: .85; }
.btn-nl:disabled { opacity: .4; cursor: not-allowed; }

.nl-hint { font-size: 10px; color: #4b5563; margin-top: 6px; }
.nl-hint code {
  background: #111827; border: 1px solid #1f2937; border-radius: 4px;
  padding: 1px 5px; font-size: 10px; color: #6b7280; margin: 0 2px;
}
.nl-feedback {
  margin-top: 7px; padding: 8px 12px; border-radius: 7px;
  font-size: 12px; font-weight: 600; display: none;
}
.nl-feedback.ok  { display:block; background:#052e16; border:1px solid #16a34a33; color:#4ade80; }
.nl-feedback.err { display:block; background:#2d0a0a; border:1px solid #ef444433; color:#f87171; }

/* ── Main ── */
.main { padding: 22px 28px; }

.section-hdr {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.section-title { font-size: 14px; font-weight: 600; color: #e2e8f0; }

/* ── Agent Cards ── */
.agents-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
  gap: 16px;
}

.agent-card {
  background: #111827; border: 1px solid #1f2937;
  border-radius: 12px; overflow: hidden;
  transition: border-color .2s;
}
.agent-card:hover { border-color: #374151; }

.agent-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px; border-bottom: 1px solid #1f2937;
  background: #0e1320;
}
.agent-info { display: flex; align-items: center; gap: 10px; }
.agent-emoji {
  width: 36px; height: 36px; background: #0b0f1a;
  border-radius: 8px; display: flex; align-items: center;
  justify-content: center; font-size: 18px;
}
.agent-name { font-size: 14px; font-weight: 700; color: #fff; }
.agent-desc { font-size: 11px; color: #6b7280; margin-top: 1px; }

.agent-controls { display: flex; align-items: center; gap: 7px; }

.status-pill {
  padding: 2px 9px; border-radius: 20px;
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .3px;
}
.s-active   { background:#052e16; color:#4ade80; border:1px solid #16a34a33; }
.s-idle     { background:#1c1407; color:#fbbf24; border:1px solid #d9770633; }
.s-stopped  { background:#2d0a0a; color:#f87171; border:1px solid #ef444433; }

/* ── Tasks ── */
.tasks { padding: 10px 14px 12px; }

.task-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 11px; border-radius: 7px; margin-bottom: 5px;
  background: #0b0f1a; border: 1px solid #1f2937;
  gap: 8px; transition: border-color .15s;
}
.task-row:hover { border-color: #374151; }

.task-left { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
.task-dot  { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.d-active    { background: #4ade80; box-shadow: 0 0 5px #4ade8055; }
.d-idle      { background: #fbbf24; }
.d-completed { background: #54C6EB; }
.d-stopped   { background: #f87171; }

.task-name {
  font-size: 12px; font-weight: 600; color: #e2e8f0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.task-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

.tag {
  padding: 2px 7px; border-radius: 4px;
  font-size: 10px; font-weight: 600; white-space: nowrap;
}
.t-sched { background:#0c2340; color:#54C6EB; }
.t-comm  { background:#0a2010; color:#4ade80; }

.task-time { font-size: 10px; color: #4b5563; white-space: nowrap; }

.empty { text-align:center; padding:16px; color:#4b5563; font-size:11px; }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 13px; border-radius: 7px; border: none;
  font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s;
}
.btn-primary { background: linear-gradient(135deg,#048A81,#065f5c); color:#fff; }
.btn-primary:hover { opacity:.85; }
.btn-ghost {
  background: transparent; color: #6b7280;
  border: 1px solid #1f2937; padding: 5px 10px; font-size: 11px;
}
.btn-ghost:hover { background:#1f2937; color:#e2e8f0; }
.btn-del {
  background: transparent; color: #6b7280;
  border: 1px solid transparent; padding: 4px 8px; font-size: 11px;
}
.btn-del:hover { color:#f87171; border-color:#f8717133; background:#2d0a0a; }
.btn-add-task {
  width: 100%; background: transparent; color: #374151;
  border: 1px dashed #1f2937; border-radius: 7px;
  padding: 7px; font-size: 11px; font-weight: 600;
  cursor: pointer; margin-top: 6px; transition: all .15s;
}
.btn-add-task:hover { color:#54C6EB; border-color:#54C6EB44; background:#54C6EB0a; }

/* ── Modals ── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: #000000bb; z-index: 200;
  align-items: center; justify-content: center;
}
.overlay.open { display: flex; }

.modal {
  background: #111827; border: 1px solid #1f2937;
  border-radius: 14px; padding: 24px; width: 400px; max-width: 92vw;
}
.modal h2 { font-size: 15px; font-weight: 700; margin-bottom: 18px; color: #fff; }

.fg { margin-bottom: 12px; }
.fg label {
  display: block; font-size: 11px; color: #6b7280;
  font-weight: 600; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 4px;
}
.fg input, .fg select, .fg textarea {
  width: 100%; background: #0b0f1a; border: 1px solid #1f2937;
  border-radius: 7px; color: #e2e8f0; padding: 8px 11px; font-size: 13px; outline: none;
}
.fg input:focus, .fg select:focus, .fg textarea:focus { border-color: #048A81; }
.fg textarea { resize: vertical; min-height: 60px; }

.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
.btn-cancel { background:transparent; border:1px solid #1f2937; color:#6b7280; }
.btn-cancel:hover { background:#1f2937; }

/* ── Company color accent ── */
.co-accent { border-top: 3px solid var(--co-color, #048A81); }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 22px; right: 22px;
  background: #111827; border: 1px solid #4ade8044; color: #4ade80;
  padding: 10px 18px; border-radius: 9px; font-size: 12px; font-weight: 600;
  opacity: 0; transform: translateY(8px); transition: all .2s; z-index: 300;
}
.toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">
    <div class="logo-icon">🤖</div>
    <div>
      <h1>Antoni — Agent Dashboard</h1>
      <p>Commodity Export Automation Hub</p>
    </div>
  </div>
  <div class="header-right">
    <div class="live-pill"><div class="live-dot"></div>LIVE</div>
    <button class="btn btn-primary" onclick="openModal('modal-company')">+ Add Company</button>
  </div>
</header>

<!-- Stats -->
<div class="stats" id="stats"></div>

<!-- Company Tabs -->
<div class="tabs" id="tabs"></div>

<!-- NL Bar -->
<div class="nl-wrap">
  <div class="nl-row">
    <span style="font-size:16px;flex-shrink:0">✨</span>
    <input class="nl-input" id="nl-input" type="text"
      placeholder="Describe a task in plain language..."
      onkeydown="if(event.key==='Enter')submitNL()">
    <div class="nl-selects">
      <select class="nl-select" id="nl-company" onchange="refreshNLAgents()">
        <option value="">Company...</option>
      </select>
      <select class="nl-select" id="nl-agent">
        <option value="">Auto-detect agent</option>
      </select>
    </div>
    <button class="btn-nl" id="nl-btn" onclick="submitNL()">Add Task →</button>
  </div>
  <div class="nl-hint">
    Examples:
    <code>"Check cocoa futures every morning at 8am"</code>
    <code>"Draft buyer email for new coffee prospects weekly"</code>
    <code>"Send hedge report every Friday"</code>
  </div>
  <div class="nl-feedback" id="nl-feedback"></div>
</div>

<!-- Main content -->
<div class="main" id="main-content"></div>

<!-- Modal: Add Company -->
<div class="overlay" id="modal-company">
  <div class="modal">
    <h2>🏢 Add Company</h2>
    <div class="fg"><label>Company Name</label><input id="co-name" type="text" placeholder="e.g. ACME Trading"></div>
    <div class="fg"><label>Emoji</label><input id="co-emoji" type="text" value="🏢" maxlength="2"></div>
    <div class="fg">
      <label>Color</label>
      <select id="co-color">
        <option value="#048A81">Teal</option>
        <option value="#7C3AED">Purple</option>
        <option value="#DC2626">Red</option>
        <option value="#D97706">Amber</option>
        <option value="#2563EB">Blue</option>
        <option value="#059669">Green</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeModal('modal-company')">Cancel</button>
      <button class="btn btn-primary" onclick="submitAddCompany()">Create</button>
    </div>
  </div>
</div>

<!-- Modal: Add Agent -->
<div class="overlay" id="modal-agent">
  <div class="modal">
    <h2>🤖 Add Agent</h2>
    <input type="hidden" id="ag-co-id">
    <div class="fg"><label>Agent Name</label><input id="ag-name" type="text" placeholder="e.g. Price Checker"></div>
    <div class="fg"><label>Emoji</label><input id="ag-emoji" type="text" value="🤖" maxlength="2"></div>
    <div class="fg"><label>Description</label><input id="ag-desc" type="text" placeholder="What does this agent do?"></div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeModal('modal-agent')">Cancel</button>
      <button class="btn btn-primary" onclick="submitAddAgent()">Create</button>
    </div>
  </div>
</div>

<!-- Modal: Add Task -->
<div class="overlay" id="modal-task">
  <div class="modal">
    <h2>⚡ Add Task</h2>
    <input type="hidden" id="tk-co-id">
    <input type="hidden" id="tk-ag-id">
    <div class="fg"><label>Task Name</label><input id="tk-name" type="text" placeholder="e.g. Weekly Cocoa Report"></div>
    <div class="fg"><label>Schedule</label><input id="tk-schedule" type="text" placeholder="e.g. Daily 9 AM / On demand / Weekly Monday"></div>
    <div class="fg">
      <label>Commodity</label>
      <select id="tk-commodity">
        <option>All</option><option>Cocoa</option><option>Coffee</option>
        <option>Mung Beans</option><option>Sesame</option><option>Cocoa + Coffee</option>
      </select>
    </div>
    <div class="fg"><label>Command / Notes</label><textarea id="tk-command" placeholder="e.g. python3 ~/.noeai/automations/my_script.py"></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeModal('modal-task')">Cancel</button>
      <button class="btn btn-primary" onclick="submitAddTask()">Add Task</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
let state = { companies: [] };
let activeTab = null;

async function load() {
  const r = await fetch('/api/data');
  state = await r.json();
  if (!activeTab && state.companies.length) activeTab = state.companies[0].id;
  render();
}

function render() {
  renderStats();
  renderTabs();
  renderNLCompanies();
  renderMain();
}

function renderStats() {
  const cos   = state.companies.length;
  const agents = state.companies.flatMap(c => c.agents).length;
  const tasks  = state.companies.flatMap(c => c.agents).flatMap(a => a.tasks);
  const active = tasks.filter(t => t.status === 'active').length;
  const done   = tasks.filter(t => t.status === 'completed').length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-icon">🏢</div><div><div class="stat-label">Companies</div><div class="stat-val">${cos}</div></div></div>
    <div class="stat"><div class="stat-icon">🤖</div><div><div class="stat-label">Agents</div><div class="stat-val">${agents}</div></div></div>
    <div class="stat"><div class="stat-icon">⚡</div><div><div class="stat-label">Active Tasks</div><div class="stat-val">${active}</div></div></div>
    <div class="stat"><div class="stat-icon">✅</div><div><div class="stat-label">Completed</div><div class="stat-val">${done}</div></div></div>
  `;
}

function renderTabs() {
  document.getElementById('tabs').innerHTML = state.companies.map(co => {
    const count = co.agents.flatMap(a => a.tasks).length;
    const active = activeTab === co.id;
    return `<div class="tab ${active ? 'active' : ''}" style="--co-color:${co.color}" onclick="setTab('${co.id}')">
      ${co.emoji} ${co.name}
      <span class="tab-badge">${count}</span>
    </div>`;
  }).join('') + `<div class="tab" onclick="openModal('modal-company')" style="color:#4b5563">+ Add</div>`;
}

function renderNLCompanies() {
  const sel = document.getElementById('nl-company');
  const cur = sel.value;
  sel.innerHTML = '<option value="">Company...</option>' +
    state.companies.map(c => `<option value="${c.id}" ${c.id===cur?'selected':''}>${c.emoji} ${c.name}</option>`).join('');
  refreshNLAgents();
}

function refreshNLAgents() {
  const coId = document.getElementById('nl-company').value;
  const co   = state.companies.find(c => c.id === coId);
  const sel  = document.getElementById('nl-agent');
  sel.innerHTML = '<option value="">Auto-detect agent</option>' +
    (co ? co.agents.map(a => `<option value="${a.id}">${a.emoji} ${a.name}</option>`).join('') : '');
}

function renderMain() {
  const co = state.companies.find(c => c.id === activeTab);
  if (!co) {
    document.getElementById('main-content').innerHTML =
      `<div style="text-align:center;padding:60px;color:#4b5563">No company selected — add one above ↑</div>`;
    return;
  }

  const agentCards = co.agents.map(ag => `
    <div class="agent-card co-accent" style="--co-color:${co.color}">
      <div class="agent-head">
        <div class="agent-info">
          <div class="agent-emoji">${ag.emoji}</div>
          <div>
            <div class="agent-name">${ag.name}</div>
            <div class="agent-desc">${ag.description}</div>
          </div>
        </div>
        <div class="agent-controls">
          <span class="status-pill s-${ag.status}">${ag.status}</span>
          <button class="btn btn-del" onclick="deleteAgent('${co.id}','${ag.id}')">✕</button>
        </div>
      </div>
      <div class="tasks">
        ${ag.tasks.length === 0
          ? '<div class="empty">No tasks yet — add one below</div>'
          : ag.tasks.map(t => `
            <div class="task-row">
              <div class="task-left">
                <div class="task-dot d-${t.status}"></div>
                <div class="task-name" title="${t.name}">${t.name}</div>
              </div>
              <div class="task-right">
                <span class="tag t-sched">${t.schedule}</span>
                <span class="tag t-comm">${t.commodity}</span>
                <span class="task-time">${t.last_run}</span>
                <button class="btn btn-del" onclick="deleteTask('${co.id}','${ag.id}','${t.id}')">✕</button>
              </div>
            </div>
          `).join('')
        }
        <button class="btn-add-task" onclick="openAddTask('${co.id}','${ag.id}')">+ Add Task</button>
      </div>
    </div>
  `).join('');

  document.getElementById('main-content').innerHTML = `
    <div class="section-hdr">
      <span class="section-title" style="color:${co.color}">${co.emoji} ${co.name} — Agents</span>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost" onclick="openAddAgent('${co.id}')">+ Add Agent</button>
        <button class="btn btn-del" onclick="deleteCompany('${co.id}')">Delete Company</button>
      </div>
    </div>
    <div class="agents-grid">${agentCards}</div>
  `;
}

function setTab(id) { activeTab = id; render(); }

// ── Modals ────────────────────────────────────────────────
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function openAddAgent(coId) {
  document.getElementById('ag-co-id').value = coId;
  openModal('modal-agent');
}
function openAddTask(coId, agId) {
  document.getElementById('tk-co-id').value = coId;
  document.getElementById('tk-ag-id').value = agId;
  openModal('modal-task');
}

// ── API calls ─────────────────────────────────────────────
async function submitAddCompany() {
  const payload = { name: document.getElementById('co-name').value, emoji: document.getElementById('co-emoji').value, color: document.getElementById('co-color').value };
  if (!payload.name) return;
  const r = await fetch('/api/companies', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
  const co = await r.json();
  activeTab = co.id;
  closeModal('modal-company');
  document.getElementById('co-name').value = '';
  toast('✅ Company created!');
  load();
}

async function submitAddAgent() {
  const coId = document.getElementById('ag-co-id').value;
  const payload = { name: document.getElementById('ag-name').value, emoji: document.getElementById('ag-emoji').value, description: document.getElementById('ag-desc').value };
  if (!payload.name) return;
  await fetch(`/api/companies/${coId}/agents`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
  closeModal('modal-agent');
  ['ag-name','ag-desc'].forEach(id => document.getElementById(id).value = '');
  toast('✅ Agent created!');
  load();
}

async function submitAddTask() {
  const coId = document.getElementById('tk-co-id').value;
  const agId = document.getElementById('tk-ag-id').value;
  const payload = { name: document.getElementById('tk-name').value, schedule: document.getElementById('tk-schedule').value || 'On demand', commodity: document.getElementById('tk-commodity').value, command: document.getElementById('tk-command').value };
  if (!payload.name) return;
  await fetch(`/api/companies/${coId}/agents/${agId}/tasks`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
  closeModal('modal-task');
  ['tk-name','tk-schedule','tk-command'].forEach(id => document.getElementById(id).value = '');
  toast('✅ Task added!');
  load();
}

async function deleteCompany(coId) {
  if (!confirm('Delete this company and ALL its agents and tasks?')) return;
  await fetch(`/api/companies/${coId}`, { method:'DELETE' });
  activeTab = state.companies.find(c => c.id !== coId)?.id || null;
  toast('🗑️ Company deleted');
  load();
}

async function deleteAgent(coId, agId) {
  if (!confirm('Delete this agent and all its tasks?')) return;
  await fetch(`/api/companies/${coId}/agents/${agId}`, { method:'DELETE' });
  toast('🗑️ Agent deleted');
  load();
}

async function deleteTask(coId, agId, taskId) {
  await fetch(`/api/companies/${coId}/agents/${agId}/tasks/${taskId}`, { method:'DELETE' });
  toast('🗑️ Task removed');
  load();
}

// ── NL Input ──────────────────────────────────────────────
async function submitNL() {
  const input    = document.getElementById('nl-input');
  const btn      = document.getElementById('nl-btn');
  const fb       = document.getElementById('nl-feedback');
  const coId     = document.getElementById('nl-company').value;
  const agId     = document.getElementById('nl-agent').value;
  const text     = input.value.trim();
  if (!text) return;
  if (!coId) { fb.className='nl-feedback err'; fb.textContent='⚠️ Select a company first'; return; }

  btn.disabled = true; btn.textContent = 'Processing...';
  fb.className = 'nl-feedback';

  try {
    const r = await fetch('/api/parse-task', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, company_id: coId, agent_id: agId || null })
    });
    const d = await r.json();
    if (r.ok) {
      fb.className = 'nl-feedback ok';
      fb.innerHTML = `✅ Added <strong>"${d.task.name}"</strong> → <strong>${d.agent_name}</strong> &nbsp;|&nbsp; 📅 ${d.task.schedule} &nbsp;|&nbsp; 📦 ${d.task.commodity}`;
      input.value = '';
      load();
    } else {
      fb.className = 'nl-feedback err';
      fb.textContent = '❌ ' + (d.error || 'Could not parse');
    }
  } catch(e) {
    fb.className = 'nl-feedback err';
    fb.textContent = '❌ Server error';
  }
  btn.disabled = false; btn.textContent = 'Add Task →';
  setTimeout(() => fb.className = 'nl-feedback', 5000);
}

// ── Helpers ───────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

document.querySelectorAll('.overlay').forEach(el =>
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); })
);

load();
setInterval(load, 30000);
</script>
